<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio application flow</title>
  <desc id="desc">Diagram showing the portfolio sections and data flow from React UI to Supabase contact messages and GitHub Pages deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="520" rx="28" fill="url(#bg)"/>
  <text x="72" y="86" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Portfolio Experience Map</text>
  <text x="72" y="122" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">A single-page React portfolio with multilingual content, responsive sections, and contact persistence.</text>

  <g fill="none" stroke="#0e7490" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M288 238H408"/>
    <path d="M608 238H728"/>
    <path d="M928 238H1048"/>
    <path d="M448 336L448 384H1014"/>
    <path d="M1014 384V310"/>
  </g>

  <g transform="translate(72 172)">
    <rect width="216" height="132" rx="18" fill="url(#card)" stroke="#bae6fd"/>
    <text x="28" y="42" fill="#0369a1" font-family="Consolas, monospace" font-size="18" font-weight="700">01</text>
    <text x="28" y="75" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Visitor</text>
    <text x="28" y="105" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="15">Opens the live site</text>
  </g>

  <g transform="translate(408 172)">
    <rect width="200" height="132" rx="18" fill="url(#card)" stroke="#bae6fd"/>
    <text x="28" y="42" fill="#0369a1" font-family="Consolas, monospace" font-size="18" font-weight="700">02</text>
    <text x="28" y="75" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">React UI</text>
    <text x="28" y="105" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="15">Home to Contact flow</text>
  </g>

  <g transform="translate(728 172)">
    <rect width="200" height="132" rx="18" fill="url(#card)" stroke="#bbf7d0"/>
    <text x="28" y="42" fill="#047857" font-family="Consolas, monospace" font-size="18" font-weight="700">03</text>
    <text x="28" y="75" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Content</text>
    <text x="28" y="105" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="15">EN, AR, ES sections</text>
  </g>

  <g transform="translate(1048 172)">
    <rect width="160" height="132" rx="18" fill="url(#card)" stroke="#bae6fd"/>
    <text x="24" y="42" fill="#0369a1" font-family="Consolas, monospace" font-size="18" font-weight="700">04</text>
    <text x="24" y="75" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Contact</text>
    <text x="24" y="105" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="15">Supabase insert</text>
  </g>

  <g transform="translate(368 384)">
    <rect width="160" height="72" rx="16" fill="#0f172a"/>
    <text x="30" y="45" fill="#a5f3fc" font-family="Consolas, monospace" font-size="17">Vite Build</text>
  </g>

  <g transform="translate(934 384)">
    <rect width="160" height="72" rx="16" fill="#0f172a"/>
    <text x="24" y="45" fill="#bbf7d0" font-family="Consolas, monospace" font-size="17">GitHub Pages</text>
  </g>
