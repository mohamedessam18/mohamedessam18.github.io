<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohamed Essam portfolio preview banner</title>
  <desc id="desc">A polished developer portfolio banner with mobile app screens, code cards, and a dark cyan visual identity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="144" y1="94" x2="1116" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <path d="M0 492C154 421 262 474 411 401C576 320 575 185 746 136C910 90 1054 167 1280 90V640H0V492Z" fill="#0f766e" opacity="0.18"/>
  <path d="M0 133C134 179 251 142 390 105C553 62 711 90 860 137C1017 186 1134 173 1280 108" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="1010" cy="136" r="190" fill="#22d3ee" opacity="0.08"/>
  <circle cx="194" cy="493" r="165" fill="#34d399" opacity="0.08"/>

  <g transform="translate(96 100)">
