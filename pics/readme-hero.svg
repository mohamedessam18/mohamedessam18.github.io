    <circle cx="28" cy="26" r="7" fill="#ef4444"/>
    <circle cx="52" cy="26" r="7" fill="#f59e0b"/>
    <circle cx="76" cy="26" r="7" fill="#22c55e"/>
    <text x="28" y="104" fill="#22d3ee" font-family="Consolas, monospace" font-size="22">&lt;Portfolio /&gt;</text>
    <text x="28" y="150" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Mohamed Essam</text>
    <text x="28" y="190" fill="#34d399" font-family="Consolas, monospace" font-size="22">Flutter Developer</text>
    <text x="28" y="230" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="19">Mobile apps, clean UI, multilingual</text>
    <text x="28" y="260" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="19">portfolio experience, and contact flow.</text>
    <rect x="28" y="292" width="138" height="38" rx="10" fill="#0891b2" fill-opacity="0.18" stroke="#22d3ee"/>
    <text x="52" y="317" fill="#a5f3fc" font-family="Consolas, monospace" font-size="16">Projects</text>
    <rect x="182" y="292" width="116" height="38" rx="10" fill="#059669" fill-opacity="0.18" stroke="#34d399"/>
    <text x="209" y="317" fill="#bbf7d0" font-family="Consolas, monospace" font-size="16">Contact</text>
  </g>

